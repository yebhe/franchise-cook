name: 🚀 Déploiement automatique sur AlwaysData

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Déployer sur AlwaysData
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Déploiement sur AlwaysData
        uses: appleboy/ssh-action@master
        with:
          host: ssh-${{ secrets.USERNAME }}.alwaysdata.net
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          script: |
            echo "🔗 Connexion au serveur AlwaysData..."

            APP_DIR="$HOME/www/franchise-cook"
            cd $HOME

            # --- Cloner ou mettre à jour le repo ---
            if [ -d "$APP_DIR/.git" ]; then
              echo "📦 Mise à jour du dépôt existant..."
              cd $APP_DIR
              git reset --hard
              git pull origin main
            else
              echo "🆕 Clonage du dépôt..."
              git clone https://github.com/yebhe/franchise-cook.git $APP_DIR
            fi

            # --- Activer l'environnement virtuel ---
            echo "🐍 Activation de l'environnement virtuel..."
            source $HOME/env/bin/activate

            # --- Installer les dépendances Python ---
            echo "📦 Installation des dépendances Python..."
            pip install --upgrade pip
            pip install -r $APP_DIR/backend/requirements.txt

            # --- Appliquer les migrations Django ---
            echo "🔧 Application des migrations Django..."
            cd $APP_DIR/backend
            python manage.py migrate --noinput

            # --- Collecte des fichiers statiques ---
            echo "⚠️ Cette étape est maintenant faite manuellement."
            # python manage.py collectstatic --noinput

            # --- Redémarrage de l’application WSGI ---
            echo "♻️ Redémarrage du service WSGI..."
            touch $APP_DIR/backend/backend/wsgi.py

            echo "✅ Déploiement terminé avec succès !"
